<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пиво для Коня | Главная</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #121212;
            color: #e0e0e0;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        :root {
            --accent: #e6b422;
            --accent-hover: #f0c45a;
            --gray-border: #404040;
        }

        /* Навигация */
        .navbar {
            background: #181818e6;
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--gray-border);
            padding: 16px 0;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent);
            text-decoration: none;
        }

        .logo span {
            color: #e0e0e0;
        }

        .nav-links {
            display: flex;
            gap: 32px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: #ddd;
            font-weight: 500;
            transition: 0.2s;
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        /* Hero секция */
        .hero {
            min-height: 85vh;
            display: flex;
            align-items: center;
            background: radial-gradient(circle at 10% 30%, #1a1a1a, #0e0e0e);
        }

        .hero-content {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 40px;
            justify-content: space-between;
        }

        .hero-text {
            flex: 1;
        }

        .hero-text h1 {
            font-size: 3.8rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        .hero-text h1 .accent {
            color: var(--accent);
        }

        .hero-text p {
            font-size: 1.2rem;
            color: #bcbcbc;
            margin-bottom: 32px;
        }

        .hero-img {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .hero-img img {
            max-width: 100%;
            width: 360px;
            filter: drop-shadow(0 20px 25px rgba(0,0,0,0.5));
            border-radius: 32px;
        }

        .btn-hero {
            background: var(--accent);
            border: none;
            padding: 14px 34px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 48px;
            color: #1a1a1a;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-hero:hover {
            background: var(--accent-hover);
            transform: translateY(-3px);
        }

        /* Карточки товаров */
        .section-title {
            font-size: 2.5rem;
            font-weight: 600;
            margin: 60px 0 16px 0;
        }

        .section-title:after {
            content: '';
            display: block;
            width: 70px;
            height: 3px;
            background: var(--accent);
            margin-top: 12px;
        }

        .beer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 40px;
            margin: 40px 0;
        }

        .beer-card {
            background: #2a2a2a;
            border-radius: 28px;
            overflow: hidden;
            transition: transform 0.25s ease;
            border: 1px solid var(--gray-border);
        }

        .beer-card:hover {
            transform: translateY(-6px);
            border-color: var(--accent);
        }

        .beer-img {
            width: 100%;
            height: 260px;
            object-fit: cover;
        }

        .beer-info {
            padding: 24px 20px 28px;
        }

        .beer-title {
            font-size: 1.7rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .price {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent);
            margin: 15px 0;
        }

        .btn-order {
            background: transparent;
            border: 1.5px solid var(--accent);
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            color: var(--accent);
            transition: all 0.25s ease;
            width: 100%;
        }

        .btn-order:hover {
            background: var(--accent);
            color: #121212;
        }

        footer {
            background: #0f0f0f;
            padding: 40px 0;
            text-align: center;
            border-top: 1px solid var(--gray-border);
            margin-top: 60px;
        }

        @media (max-width: 800px) {
            .hero-text h1 { font-size: 2.5rem; }
            .nav-links { gap: 20px; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="container nav-container">
        <a href="index.html" class="logo">ПИВО<span>ДЛЯ КОНЯ</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Главная</a></li>
            <li><a href="catalog.html">Каталог</a></li>
        </ul>
    </div>
</nav>

<section class="hero">
    <div class="container hero-content">
        <div class="hero-text">
            <h1>Пиво, которое <span class="accent">понимает коня</span></h1>
            <p>Солодовые эликсиры с характером. Создано вручную, чтобы ржать от удовольствия.</p>
            <button class="btn-hero" onclick="location.href='catalog.html'">Смотреть каталог →</button>
        </div>
        <div class="hero-img">
            <img src="images/124c55907e1b11ee83ee261105627a54_upscaled.jpeg" alt="Пиво для коня">
        </div>
    </div>
</section>

<div class="container">
    <h2 class="section-title">Хиты продаж</h2>
    <div class="beer-grid" id="featuredGrid"></div>
</div>

<footer>
    <div class="container">
        <p>🍺 Пиво для Коня — Где сила встречает вкус. © 2025</p>
    </div>
</footer>

<script>
    const featuredBeers = [
        {
            name: "Золотая грива",
            img: "https://placehold.co/600x450/2f2f2f/e6b422?text=Golden+Mane",
            price: "490",
            desc: "Янтарный эль с нотами цитруса"
        },
        {
            name: "Ночной галоп",
            img: "https://placehold.co/600x450/2a2a2a/d4af37?text=Night+Gallop",
            price: "590",
            desc: "Плотный стаут с шоколадом"
        },
        {
            name: "Сильный жеребец",
            img: "https://placehold.co/600x450/282828/f4c542?text=Stallion+IPA",
            price: "650",
            desc: "Америкэн IPA с тропиками"
        }
    ];

    function renderFeatured() {
        const grid = document.getElementById('featuredGrid');
        grid.innerHTML = featuredBeers.map(beer => `
            <div class="beer-card">
                <img class="beer-img" src="${beer.img}" alt="${beer.name}">
                <div class="beer-info">
                    <div class="beer-title">${beer.name}</div>
                    <div class="price">${beer.price} ₽</div>
                    <button class="btn-order" onclick="alert('🍻 ${beer.name} добавлено в корзину!')">Заказать</button>
                </div>
            </div>
        `).join('');
    }
    renderFeatured();
</script>

</body>
</html>
