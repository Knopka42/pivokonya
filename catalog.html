<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Секретная кнопка | Анекдоты про коня и пиво</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a1a, #0d0d0d);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        .secret-card {
            background: #2a2a2a;
            border-radius: 60px;
            padding: 50px;
            border: 2px solid #e6b422;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #e6b422;
        }
        .secret-btn-big {
            background: #e6b422;
            border: none;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            font-size: 60px;
            cursor: pointer;
            margin: 30px auto;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(230,180,34,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .secret-btn-big:hover {
            transform: scale(1.1) rotate(10deg);
            background: #f0c45a;
            box-shadow: 0 0 35px rgba(230,180,34,0.8);
        }
        .joke-box {
            background: #1e1e1e;
            border-radius: 30px;
            padding: 25px;
            margin-top: 30px;
            border-left: 5px solid #e6b422;
        }
        .joke-question {
            font-size: 1.2rem;
            color: #ccc;
            margin-bottom: 15px;
        }
        .joke-answer {
            font-size: 1.5rem;
            font-weight: bold;
            color: #e6b422;
        }
        .counter {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #888;
        }
        footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="secret-card">
            <h1>🍺 Секретная кнопка 🐴</h1>
            <p>Нажми на неё, и конь расскажет анекдот</p>
            
            <div class="secret-btn-big" id="bigSecretBtn">🍻</div>
            
            <div class="joke-box" id="jokeBox">

                <div class="joke-answer" id="jokeAnswer
